<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>DocuScript AI - Cinematic Documentary Script Generator</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <!-- App Styles -->
    <link href="css/main.css" rel="stylesheet" />

    <!-- Tailwind Config (consistent with original pages) -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4af25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#0a0b10",
                        "navy-deep": "#050505",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    </script>
    <style>
        /* PDF EXPORT OVERRIDES (GLOBAL) */
        body.pdf-mode {
            background-color: white !important;
        }
        body.pdf-mode #script-paper {
            background-color: white !important;
            color: black !important;
            width: 790px !important; /* Forces a standard width that fits the PDF */
            max-width: none !important;
            margin: 0 !important; /* Force to top-left to avoid html2canvas offset issues */
            padding: 50px !important;
            border: none !important;
            box-shadow: none !important;
            transform: none !important;
            left: 0 !important;
            top: 0 !important;
            position: relative !important;
        }
        body.pdf-mode #script-paper * {
            color: black !important;
            background-color: transparent !important;
            text-shadow: none !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
        body.pdf-mode #script-paper .script-scene-heading {
            border-bottom: 2px solid #ddd !important;
        }
        body.pdf-mode .generated-sequence {
            border: none !important;
            margin-top: 0 !important;
            padding-top: 0 !important;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 selection:bg-primary/30">

    <!-- Film Grain Overlay (shared across all pages) -->
    <div class="film-grain"></div>

    <!-- ============================================
         MAIN CONTENT CONTAINER
         Views are loaded dynamically here
         ============================================ -->
    <div id="app-content">
        <!-- Loading state (shown before first view loads) -->
        <div class="view-container page-loading"></div>
    </div>

    <!-- ============================================
         SCRIPTS
         ============================================ -->
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-analytics-compat.js"></script>
    
    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- App Scripts -->
    <script src="js/state.js"></script>
    <script src="js/transitions.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/gemini.js"></script>
    <script src="js/router.js"></script>

</body>

</html>
